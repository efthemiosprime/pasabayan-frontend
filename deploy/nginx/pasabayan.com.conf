server {
    server_name pasabayan.com www.pasabayan.com;

    root /var/www/pasabayan-frontend/build;
    index index.html;

    # Apple App Site Association — iOS Universal Links.
    # Exact-match location beats the SPA "location /" fallback; force JSON type.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Content-Type application/json;
        return 200 '{"applinks":{"details":[{"appID":"2F2MGP4R3K.com.efthemiosprime.Pasabayan","paths":["/app/*"]}]}}';
    }

    location /snapflow {
        try_files $uri $uri/ /snapflow/index.html;
    }

    # IMPORTANT: $uri/ is required so directory index.html files resolve.
    # Each static page (privacy-policy/, terms-of-service/, support/, etc.)
    # is built as <dir>/index.html. Without $uri/, nginx skips the directory
    # index and every subpage falls through to /index.html (the home page).
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pasabayan.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pasabayan.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.pasabayan.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = pasabayan.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name pasabayan.com www.pasabayan.com;
    return 404; # managed by Certbot
}
